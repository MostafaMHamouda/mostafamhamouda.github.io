    <title>The Learnova Lost Map</title>
    <script>
      (function (location) {
        if (location.search.startsWith('?/')) {
          const decoded = location.search
            .slice(2)
            .split('&')
            .map((segment, index) =>
              index === 0 ? segment : `?${segment.replace(/~and~/g, '&')}`,
            )
            .join('');

          window.history.replaceState(null, '', `/${decoded}${location.hash}`);
        }
      })(window.location);
    </script>
